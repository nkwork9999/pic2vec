
extension:
  name: pic2vec
  description: Picture-to-vector — image embeddings from SQL via ONNX Runtime. Bundles Meta's EUPE ViT-T/16; works with any ONNX vision model.
  version: 0.1.0
  language: C++
  build: cmake
  license: MIT
  maintainers:
    - nkwork9999

repo:
  github: nkwork9999/pic2vec
  ref: f61b0fb9cda1e76ab78a303aa43f2fbeebe385f0

docs:
  hello_world: |
    -- Bundled EUPE ViT-T auto-loads on first call - zero setup
    SELECT pic2vec_embed('/path/to/image.jpg') AS embedding;

    -- Or load any ONNX vision model explicitly
    SELECT pic2vec_load_model('/path/to/model.onnx', 'my_model');
    SELECT pic2vec_embed('/path/to/image.jpg', 'my_model');
  extended_description: |
    `pic2vec` is a vision-embedding extension for DuckDB built on ONNX Runtime.
    It ships with Meta's EUPE ViT-T/16 (6M params) bundled into the extension binary
    so the simplest workflow needs zero setup. Any ONNX vision model with NCHW input
    `[N, 3, H, W]` and a single embedding output also works.

    **Features:**
    - Bundled EUPE ViT-T/16 — auto-loads on first `pic2vec_embed()` call (no setup)
    - Whisper-style download helper for larger models (`pic2vec_download_model`)
    - Load arbitrary local ONNX vision models
    - Cosine similarity, L2 distance, inner product (matches DuckDB built-ins)
    - L2 normalization helper (not in DuckDB core)
    - ImageNet preprocessing (resize + normalization) handled internally
    - Cross-platform (macOS, Linux, Windows)

    **Composes with built-in DuckDB:**
    `pic2vec_embed` returns `LIST(FLOAT)`. CAST to `FLOAT[N]` for use with built-in
    `array_cosine_similarity`, `array_distance`, and the `vss` extension's HNSW index.

    **EUPE Model Sizes (when downloaded/used):**
    | Model | Parameters | Embed Dim |
    |-------|-----------|-----------|
    | ViT-T/16 | 6M | 192 |
    | ViT-S/16 | 21M | 384 |
    | ViT-B/16 | 86M | 768 |

    **SQL Functions:**
    - `pic2vec_load_model(path[, name])` - Load ONNX model
    - `pic2vec_load_bundled()` - Explicitly load the bundled tiny model
    - `pic2vec_download_model(name)` - Download a known model to local cache
    - `pic2vec_embed(image_path[, model_name])` - Get embedding (auto-loads bundled)
    - `pic2vec_embed_blob(blob)` - Get embedding from BLOB data
    - `pic2vec_similarity(v1, v2)` - Cosine similarity
    - `pic2vec_distance(v1, v2)` - L2 distance
    - `pic2vec_inner_product(v1, v2)` - Dot product
    - `pic2vec_normalize(vec)` - L2 normalize vector
    - `pic2vec_dim(vec)` - Get vector dimension
    - `pic2vec_list_models()`, `pic2vec_unload_model(name)`, `pic2vec_bundled_info()`
    - `pic2vec_version()` - Extension version

    **Example: Image similarity search (standalone)**
    ```sql
    CREATE TABLE imgs AS
    SELECT filename, pic2vec_embed(filename) AS vec
    FROM glob('/data/images/*.jpg');

    SELECT a.filename, b.filename, pic2vec_similarity(a.vec, b.vec) AS sim
    FROM imgs a, imgs b WHERE a.filename < b.filename
    ORDER BY sim DESC LIMIT 10;
    ```

    **Example: HNSW search via vss (large datasets)**
    ```sql
    INSTALL vss; LOAD vss;
    CREATE TABLE imgs (filename VARCHAR, vec FLOAT[192]);
    INSERT INTO imgs SELECT filename, pic2vec_embed(filename)::FLOAT[192]
    FROM glob('/data/images/*.jpg');

    CREATE INDEX vec_idx ON imgs USING HNSW (vec) WITH (metric = 'cosine');

    SELECT filename FROM imgs
    ORDER BY array_cosine_distance(vec, pic2vec_embed('/query.jpg')::FLOAT[192])
    LIMIT 10;
    ```
